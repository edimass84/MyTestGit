<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>YouTube Downloader</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:520px;
    background:#1a1a1a;
    padding:30px;
    border-radius:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.video{background:#ff0000;color:white;}
.playlist{background:#009966;color:white;}

.progressbar{
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:#00cc66;
}

.stats{
    margin-top:10px;
    font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<h2>YouTube Downloader</h2>

<input id="url" placeholder="Вставьте ссылку YouTube">

<select id="quality">
<option value="best">Лучшее качество</option>
<option value="1080">1080p</option>
<option value="720">720p</option>
<option value="480">480p</option>
<option value="360">360p</option>
</select>

<button class="video" onclick="download('video')">Скачать видео</button>
<button class="playlist" onclick="download('playlist')">Скачать плейлист</button>

<div class="progressbar">
<div id="progress" class="progress"></div>
</div>

<div class="stats">
<div>Прогресс: <span id="percent">0%</span></div>
<div>Скорость: <span id="speed">0</span></div>
<div>Размер: <span id="size">0</span></div>
</div>

</div>

<script>

const SAVE_PATH="/downloads/youtube/";
let download_id=null;

function download(type){

    const url=document.getElementById("url").value;
    const quality=document.getElementById("quality").value;

    fetch("/download/"+type,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            url:url,
            quality:quality,
            path:SAVE_PATH
        })
    })
    .then(res=>res.json())
    .then(data=>{
        download_id=data.id
        track()
    })
}

function track(){

    const timer=setInterval(()=>{

        fetch("/progress/"+download_id)
        .then(res=>res.json())
        .then(data=>{

            document.getElementById("progress").style.width=data.percent+"%";
            document.getElementById("percent").innerText=data.percent+"%";
            document.getElementById("speed").innerText=data.speed;
            document.getElementById("size").innerText=data.size;

            if(data.done){
                clearInterval(timer)
            }

        })

    },1000)

}

</script>

</body>
</html>
